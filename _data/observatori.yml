- titol: "Adquisició pública de l'antic cinema Principal per a habitatge protegit" 
  data: "Març 2026" 
  tipus: "Proposta" 
  descripcio: "Compra pública de l'emblemàtic edifici de 1938 per evitar que promocions de luxe expulsin els veïnats del centre i destinar el solar de 939 $m^2$ a lloguer assequible." 
  estat: "🟢 APROVADA PER UNANIMITAT"
  color: "bg-green-50 text-green-700 border-green-200"
  comentari: "Hem aconseguit que l'Ajuntament lideri la recuperació de patrimoni per a la ciutadania, garantint la conservació de la façana històrica i prioritzant l'accés a l'habitatge per a joves i famílies del municipi."

- titol: "Pla manteniment escoles"
  data: "Febrer 2026"
  tipus: "Proposta"
  descripcio: "Pla específic per solucionar les deficiències estructurals dels centres educatius."
  estat: "🔴 REBUTJADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "L'equip de govern va rebutjar la proposta amb l'excusa que estaven fent feina en obrir una licitació per contractar una empresa per al manteniment. No entenen que el problema és ara i que una cosa no té res a veure amb l'altra."

- titol: "Per la protecció de Llucmajor davant la llei de Projectes Residencials Estratègics"
  data: "Febrer 2026"
  tipus: "Proposta"
  descripcio: "Llucmajor no està en venda. Proposta per la protecció de les àrees de transició i evitar que s'incrementi la població que creixin els sense serveis"
  estat: "🔴 REBUTJADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "L'equip de govern segueix les ordres de Palma i deixa que en mans dels especuladors el futur urbanístic de Llucmajor"

- titol: "Suport a la ILP per a la creació del Sistema Balear de Complement a les pensions inferiors al SMI"
  data: "Febrer 2026"
  tipus: "Proposta"
  descripcio: "Proposta perquè cap pensió estigui per davall del Salari Mínim Interprofessional"
  estat: "🔴 REBUTJADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "Amb l'excusa que no depèn de Llucmajor, l'equip de govern decideix no pressionar el govern balear per afavorir els més necessitats: els pensionistes que no arriben a cobrar el Sou Mínim Interprofessional."

- titol: "Rebuig al projecte d'instal·lació d'un circuit de motos d'aigua a la costa de s'Arenal"
  data: "Desembre 2025"
  tipus: "Proposta"
  descripcio: "Proposta evitar les molèsties que genera un circuit de motos aquàtiques a s'Arenal"
  estat: "🟢 APROVADA"
  color: "bg-green-50 text-green-700 border-green-200"
  comentari: "Hem aconseguit que Llucmajor es posicioni en contra d'una activitat per a pocs i que genera molèsties a tots els s'arenalers i totes les s'arenaleres."

- titol: "Reprovació de la regidora d'urbanisme, Inmaculada Pérez, per les faltes de respecte i menyspreu a la ciutadania"
  data: "Desembre 2025"
  tipus: "Proposta"
  descripcio: "Proposta per reprovar l'actitud de la regidora Pérez al plenari del mes de novembre quan, després de la participació de l'EMAE, va enviar a 'tomar por el culo' als ciutadans."
  estat: "🔴 REBUTJADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "La regidora rectifica tard i no dimiteix."

- titol: "Impuls definitiu del projecte d'habitatages de protecció pública del carrer del Grup Escolar de Llucmajor"
  data: "Novembre 2025"
  tipus: "Proposta"
  descripcio: "Proposta perquè l'ajuntament faci seguiment i acceleri els tràmits per tenir els habitatges públics promesos al carrer del Grup Escolar."
  estat: "🟢 APROVADA"
  color: "bg-green-50 text-green-700 border-green-200"
  comentari: "S'aprova. L'equip de govern informa que hi estan fent feina amb l'ibavi."

- titol: "Prohibició del lloguer vacacional al municipi de Llucmajor"
  data: "Octubre 2025"
  tipus: "Proposta"
  descripcio: "Proposta perquè l'ajuntament protegeixi els veïnats del municipi dels problemes d'habitatge i renous amb la prohibició del creixement del lloguer vacacional."
  estat: "🔴 REBUTJADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "L'equip de govern considera que no es pot prohibir una activitat que genera beneficis a Llucmajor."

- titol: "Informació i compromís per als projectes municipals prioritaris"
  data: "Setembre 2025"
  tipus: "Proposta"
  descripcio: "Llucmajor té molts projectes pendents. Demanam el compromís de l'equip de govern per tirar-los endavant."
  estat: "🔴 REBUTJADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "L'equip de govern no es vol comprometre a donar dates sobre la resolució dels projectes més importants que estan pendents: el manteniment de les escoles, el carrer de Pere Maimó, els centres de salut, el catàleg de patrimoni i el concurs d'idees de Cas Coix."

- titol: "Prioritzar de forma immediata la signatura del conveni per a la reforma de la residència de Llucmajor"
  data: "Setembre 2025"
  tipus: "Proposta"
  descripcio: "Fa ja un any que MÉS per Mallorca va presentar la PNL i encara no s'ha avançat en la signatura del conveni"
  estat: "🔴 REBUTJADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "Amb l'excusa del que 'hi estan fent feina' i que 'està en mans del Consell', el conveni de la residència de Llucmajor continua pendent de signar. Demanam accelerar els terminis."


