- titol: "Adquisición pública del antiguo cine Principal para vivienda de protección oficial" 
  data: "Marzo 2026" 
  tipus: "Propuesta" 
  descripcio: "Compra pública del emblemático edificio de 1938 para evitar que promociones de lujo expulsen a los vecinos del centro y destinar el solar de 939 m² a alquiler asequible." 
  estat: "🟢 APROBADA POR UNANIMIDAD"
  color: "bg-green-50 text-green-700 border-green-200"
  comentari: "Hemos conseguido que el Ayuntamiento lidere la recuperación de patrimonio para la ciudadanía, garantizando la conservación de la fachada histórica y priorizando el acceso a la vivienda para jóvenes y familias del municipio."

- titol: "Plan de mantenimiento de escuelas"
  data: "Febrero 2026"
  tipus: "Propuesta"
  descripcio: "Plan específico para solucionar las deficiencias estructurales de los centros educativos."
  estat: "🔴 RECHAZADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "El equipo de gobierno rechazó la propuesta con la excusa de que estaban trabajando en abrir una licitación para contratar a una empresa para el mantenimiento. No entienden que el problema es ahora y que una cosa no tiene nada que ver con la otra."

- titol: "Por la protección de Llucmajor frente a la ley de Proyectos Residenciales Estratégicos"
  data: "Febrero 2026"
  tipus: "Propuesta"
  descripcio: "Llucmajor no está en venta. Propuesta para la protección de las áreas de transición y evitar que se incremente la población y crezcan los 'sin servicios'."
  estat: "🔴 RECHAZADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "El equipo de gobierno sigue las órdenes de Palma y deja en manos de los especuladores el futuro urbanístico de Llucmajor."

- titol: "Apoyo a la ILP para la creación del Sistema Balear de Complemento a las pensiones inferiores al SMI"
  data: "Febrero 2026"
  tipus: "Propuesta"
  descripcio: "Propuesta para que ninguna pensión esté por debajo del Salario Mínimo Interprofesional."
  estat: "🔴 RECHAZADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "Con la excusa de que no depende de Llucmajor, el equipo de gobierno decide no presionar al gobierno balear para favorecer a los más necesitados: los pensionistas que no llegan a cobrar el Salario Mínimo Interprofesional."

- titol: "Rechazo al proyecto de instalación de un circuito de motos de agua en la costa de s'Arenal"
  data: "Diciembre 2025"
  tipus: "Propuesta"
  descripcio: "Propuesta para evitar las molestias que genera un circuito de motos acuáticas en s'Arenal."
  estat: "🟢 APROBADA"
  color: "bg-green-50 text-green-700 border-green-200"
  comentari: "Hemos conseguido que Llucmajor se posicione en contra de una actividad para unos pocos y que genera molestias a todos los vecinos y vecinas de s'Arenal."

- titol: "Reprobación de la regidora de urbanismo, Inmaculada Pérez, por las faltas de respeto y menosprecio a la ciudadanía"
  data: "Diciembre 2025"
  tipus: "Propuesta"
  descripcio: "Propuesta para reprobar la actitud de la regidora Pérez en el pleno del mes de noviembre cuando, después de la participación de la EMAE, mandó a 'tomar por el culo' a los ciudadanos."
  estat: "🔴 RECHAZADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "La regidora rectifica tarde y no dimite."

- titol: "Impulso definitivo del proyecto de viviendas de protección pública de la calle del Grup Escolar de Llucmajor"
  data: "Noviembre 2025"
  tipus: "Propuesta"
  descripcio: "Propuesta para que el ayuntamiento haga seguimiento y acelere los trámites para tener las viviendas públicas prometidas en la calle del Grup Escolar."
  estat: "🟢 APROBADA"
  color: "bg-green-50 text-green-700 border-green-200"
  comentari: "Se aprueba. El equipo de gobierno informa que están trabajando en ello con el IBAVI."

- titol: "Prohibición del alquiler vacacional en el municipio de Llucmajor"
  data: "Octubre 2025"
  tipus: "Propuesta"
  descripcio: "Propuesta para que el ayuntamiento proteja a los vecinos del municipio de los problemas de vivienda y ruidos con la prohibición del crecimiento del alquiler vacacional."
  estat: "🔴 RECHAZADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "El equipo de gobierno considera que no se puede prohibir una actividad que genera beneficios en Llucmajor."

- titol: "Información y compromiso para los proyectos municipales prioritarios"
  data: "Septiembre 2025"
  tipus: "Propuesta"
  descripcio: "Llucmajor tiene muchos proyectos pendientes. Pedimos el compromiso del equipo de gobierno para sacarlos adelante."
  estat: "🔴 RECHAZADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "El equipo de gobierno no se quiere comprometer a dar fechas sobre la resolución de los proyectos más importantes que están pendientes: el mantenimiento de las escuelas, la calle de Pere Maimó, los centros de salud, el catálogo de patrimonio y el concurso de ideas de Cas Coix."

- titol: "Priorizar de forma inmediata la firma del convenio para la reforma de la residencia de Llucmajor"
  data: "Septiembre 2025"
  tipus: "Propuesta"
  descripcio: "Hace ya un año que MÉS per Mallorca presentó la PNL y todavía no se ha avanzado en la firma del convenio."
  estat: "🔴 RECHAZADA"
  color: "bg-red-50 text-red-700 border-red-200"
  comentari: "Con la excusa de que 'están trabajando en ello' y que 'está en manos del Consell', el convenio de la residencia de Llucmajor sigue pendiente de firmar. Pedimos acelerar los plazos."