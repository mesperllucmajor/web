layout: default
title: Contacte
permalink: /contacte/
---

<header class="relative h-[350px] flex items-center overflow-hidden">
    <img src="https://images.unsplash.com/photo-1516387938699-a93567ec168e?auto=format&fit=crop&q=80&w=2000" class="absolute inset-0 w-full h-full object-cover scale-105" alt="Contacte MÉS" />
    <div class="absolute inset-0 bg-gradient-to-r from-black/90 via-black/50 to-transparent"></div>
    <div class="relative z-10 w-full px-8 md:px-16 text-left">
        <div class="max-w-3xl text-left">
            <h1 class="text-5xl md:text-7xl font-black uppercase text-white tracking-tighter mb-4 leading-none">Contacte</h1>
            <p class="text-mes-lime text-lg font-bold uppercase tracking-widest border-l-4 border-mes-lime pl-4 inline-block bg-black/40 pr-6 py-1">Digues la teva: t'escoltem</p>
        </div>
    </div>
</header>

<div class="pt-20 pb-32 px-8 max-w-5xl mx-auto text-left">
    <div class="bg-white border-2 border-stone-100 p-8 shadow-sm text-left relative">
        <form id="contact-form" action="https://formspree.io/f/EL_TEU_CODI" method="POST" class="space-y-8 text-left">
            <input class="form-input text-left" name="nom" placeholder="Nom complet" required />
            <input class="form-input text-left" type="email" name="email" placeholder="Correu electrònic" required />
            <textarea class="form-input text-left" name="missatge" rows="8" placeholder="Com et podem ajudar?" required></textarea>
            
            <button id="submit-btn" type="submit" class="btn-primary w-full justify-center text-left">Enviar missatge</button>
        </form>

        <div id="form-status" class="hidden mt-6 p-4 bg-green-50 text-green-700 border border-green-200 font-bold text-center text-sm uppercase tracking-widest">
            ✅ Gràcies! El teu missatge s'ha enviat correctament.
        </div>
    </div>

    <script>
        var form = document.getElementById("contact-form");
        var status = document.getElementById("form-status");
        var btn = document.getElementById("submit-btn");

        form.addEventListener("submit", async function(event) {
            event.preventDefault(); // Evita que la pàgina canviï a Formspree
            btn.innerHTML = "Enviant..."; // Canvia el text del botó
            btn.style.opacity = "0.5";
            btn.disabled = true;

            var data = new FormData(event.target);
            
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    status.classList.remove("hidden"); // Mostra el missatge d'èxit
                    form.reset(); // Buida els camps del formulari
                    btn.innerHTML = "Enviar missatge"; // Restaura el botó
                    btn.style.opacity = "1";
                    btn.disabled = false;
                } else {
                    btn.innerHTML = "Hi ha hagut un error";
                    btn.style.backgroundColor = "#ffcccc";
                }
            }).catch(error => {
                btn.innerHTML = "Error de connexió";
            });
        });
    </script>
</div>
